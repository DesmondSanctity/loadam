openapi: 3.0.3
info:
 title: Nested Test
 version: 1.0.0
paths:
 /users:
  post:
   operationId: createUser
   requestBody:
    required: true
    content:
     application/json:
      schema:
       $ref: '#/components/schemas/User'
   responses:
    '201':
     description: ok
     content:
      application/json:
       schema:
        $ref: '#/components/schemas/User'
 /users/{userId}:
  get:
   operationId: getUser
   parameters:
    - name: userId
      in: path
      required: true
      schema: { type: string }
   responses:
    '200':
     description: ok
     content:
      application/json:
       schema: { $ref: '#/components/schemas/User' }
 /users/{userId}/posts:
  get:
   operationId: listUserPosts
   parameters:
    - name: userId
      in: path
      required: true
      schema: { type: string }
   responses:
    '200':
     description: ok
     content:
      application/json:
       schema:
        type: array
        items: { $ref: '#/components/schemas/Post' }
  post:
   operationId: createPost
   parameters:
    - name: userId
      in: path
      required: true
      schema: { type: string }
   requestBody:
    required: true
    content:
     application/json:
      schema: { $ref: '#/components/schemas/Post' }
   responses:
    '201':
     description: ok
     content:
      application/json:
       schema: { $ref: '#/components/schemas/Post' }
 /users/{userId}/posts/{postId}:
  get:
   operationId: getPost
   parameters:
    - name: userId
      in: path
      required: true
      schema: { type: string }
    - name: postId
      in: path
      required: true
      schema: { type: string }
   responses:
    '200':
     description: ok
     content:
      application/json:
       schema: { $ref: '#/components/schemas/Post' }
components:
 schemas:
  User:
   type: object
   required: [id, name]
   properties:
    id: { type: string }
    name: { type: string }
  Post:
   type: object
   required: [id, title]
   properties:
    id: { type: string }
    title: { type: string }
    userId: { type: string }
