openapi: 3.0.3
info:
 title: Swagger Petstore
 description: A sample Petstore spec used as the loadam V1 anchor fixture.
 version: 1.0.0
servers:
 - url: https://petstore.example.com/v1
   description: Production
paths:
 /pets:
  get:
   summary: List all pets
   operationId: listPets
   tags: [pets]
   parameters:
    - name: limit
      in: query
      description: How many items to return at one time (max 100)
      required: false
      schema:
       type: integer
       format: int32
       maximum: 100
   responses:
    '200':
     description: A paged array of pets
     headers:
      x-next:
       description: A link to the next page of responses
       schema:
        type: string
     content:
      application/json:
       schema:
        $ref: '#/components/schemas/Pets'
    default:
     description: unexpected error
     content:
      application/json:
       schema:
        $ref: '#/components/schemas/Error'
  post:
   summary: Create a pet
   operationId: createPet
   tags: [pets]
   requestBody:
    required: true
    content:
     application/json:
      schema:
       $ref: '#/components/schemas/NewPet'
   responses:
    '201':
     description: Null response
    default:
     description: unexpected error
     content:
      application/json:
       schema:
        $ref: '#/components/schemas/Error'
 /pets/{petId}:
  get:
   summary: Info for a specific pet
   operationId: showPetById
   tags: [pets]
   parameters:
    - name: petId
      in: path
      required: true
      description: The id of the pet to retrieve
      schema:
       type: string
   responses:
    '200':
     description: Expected response to a valid request
     content:
      application/json:
       schema:
        $ref: '#/components/schemas/Pet'
    default:
     description: unexpected error
     content:
      application/json:
       schema:
        $ref: '#/components/schemas/Error'
  delete:
   summary: Delete a pet
   operationId: deletePet
   tags: [pets]
   parameters:
    - name: petId
      in: path
      required: true
      schema:
       type: string
   responses:
    '204':
     description: Pet deleted
    default:
     description: unexpected error
     content:
      application/json:
       schema:
        $ref: '#/components/schemas/Error'
components:
 securitySchemes:
  apiKeyAuth:
   type: apiKey
   in: header
   name: X-API-Key
 schemas:
  Pet:
   type: object
   required: [id, name]
   properties:
    id:
     type: integer
     format: int64
    name:
     type: string
    tag:
     type: string
  NewPet:
   type: object
   required: [name]
   properties:
    name:
     type: string
    tag:
     type: string
  Pets:
   type: array
   maxItems: 100
   items:
    $ref: '#/components/schemas/Pet'
  Error:
   type: object
   required: [code, message]
   properties:
    code:
     type: integer
     format: int32
    message:
     type: string
security:
 - apiKeyAuth: []
