name: Release

on:
 push:
  branches: [ main ]

# Allow only one release run at a time; cancel stale runs.
concurrency:
 group: release
 cancel-in-progress: false

jobs:
 release:
  runs-on: ubuntu-latest
  permissions:
   contents: write # for creating the git tag + GitHub Release
   id-token: write # for npm provenance
  steps:
   - uses: actions/checkout@v4
     with:
      fetch-depth: 0

   - uses: pnpm/action-setup@v4
     with:
      version: 9.15.0

   - uses: actions/setup-node@v4
     with:
      node-version: 22
      registry-url: https://registry.npmjs.org
      cache: pnpm

   - name: Install
     run: pnpm install --frozen-lockfile

   - name: Lint
     run: pnpm lint

   - name: Build
     run: pnpm -r build

   - name: Test
     run: pnpm -r test

   - name: CLI smoke (built artefact runs end-to-end)
     run: |
      set -euo pipefail
      node packages/cli/dist/bin.js --version
      node packages/cli/dist/bin.js init fixtures/specs/petstore.openapi.yaml --json > /tmp/init.json
      node -e 'const j=require("/tmp/init.json"); if(!j.operations||j.operations<1){console.error("init smoke failed");process.exit(1)}'
      node packages/cli/dist/bin.js mcp fixtures/specs/petstore.openapi.yaml --json --output /tmp/mcp-smoke > /tmp/mcp.json
      node -e 'const j=require("/tmp/mcp.json"); if(!Array.isArray(j.toolNames)||j.toolNames.length<1){console.error("mcp smoke failed");process.exit(1)}'

   - name: Verify package contents (dry-run)
     working-directory: packages/cli
     run: |
      npm pack --dry-run --json > /tmp/pack.json
      node -e 'const a=require("/tmp/pack.json"); const f=a[0].files.map(x=>x.path); for (const need of ["dist/bin.js","dist/index.js","package.json","README.md","LICENSE"]) { if(!f.some(p=>p===need||p.endsWith("/"+need))){console.error("missing from tarball:",need);process.exit(1)} } console.log("tarball OK ("+a[0].files.length+" files, "+a[0].unpackedSize+" bytes)");'

   - name: Read local CLI version
     id: local
     run: echo "version=$(node -p "require('./packages/cli/package.json').version")"
      >> "$GITHUB_OUTPUT"

   - name: Read published CLI version
     id: published
     run: |
      v=$(npm view loadam version 2>/dev/null || echo "0.0.0")
      echo "version=$v" >> "$GITHUB_OUTPUT"

   - name: Decide whether to publish
     id: decide
     run: |
      if [ "${{ steps.local.outputs.version }}" = "${{ steps.published.outputs.version }}" ]; then
       echo "publish=false" >> "$GITHUB_OUTPUT"
       echo "Local version ${{ steps.local.outputs.version }} matches published; skipping."
      elif [ "${{ steps.local.outputs.version }}" = "0.0.0" ]; then
       echo "publish=false" >> "$GITHUB_OUTPUT"
       echo "Local version is 0.0.0 (placeholder); skipping."
      else
       echo "publish=true" >> "$GITHUB_OUTPUT"
       echo "Will publish ${{ steps.local.outputs.version }} (currently published: ${{ steps.published.outputs.version }})."
      fi

   - name: Verify CHANGELOG has an entry for this version
     if: steps.decide.outputs.publish == 'true'
     run: |
      v="${{ steps.local.outputs.version }}"
      if ! grep -qE "^##? .*\[?$v\]?" CHANGELOG.md; then
       echo "CHANGELOG.md is missing a section for v$v" >&2
       exit 1
      fi
      echo "CHANGELOG entry for v$v found."

   - name: Publish to npm (Trusted Publishing via OIDC)
     if: steps.decide.outputs.publish == 'true'
     working-directory: packages/cli
     run: |
      # Trusted Publishing requires npm >= 11.5.1; setup-node@v4 ships an older npm.
      # Use npx to avoid the global self-upgrade path which can corrupt the bundled npm.
      npx -y npm@latest publish --access public --provenance

   - name: Tag release
     if: steps.decide.outputs.publish == 'true'
     run: |
      git config user.name "github-actions[bot]"
      git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      git tag "v${{ steps.local.outputs.version }}"
      git push origin "v${{ steps.local.outputs.version }}"

   - name: Create GitHub Release
     if: steps.decide.outputs.publish == 'true'
     uses: softprops/action-gh-release@v2
     with:
      tag_name: v${{ steps.local.outputs.version }}
      name: v${{ steps.local.outputs.version }}
      generate_release_notes: true
